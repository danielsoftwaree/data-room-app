services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dataroom
      POSTGRES_USER: dataroom
      POSTGRES_PASSWORD: dataroom
    ports:
      - '5432:5432'
    volumes:
      - dataroom-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dataroom -d dataroom']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dataroom-postgres:
