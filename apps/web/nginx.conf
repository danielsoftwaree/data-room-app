server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the api service on the compose network. Using a variable
  # + the docker DNS resolver means nginx starts even if `api` is not up yet
  # (it re-resolves per request instead of failing at boot). No URI is appended,
  # so the original /api/... path is forwarded unchanged.
  location /api/ {
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # PDF uploads: don't cap the request body.
    client_max_body_size 50m;
    proxy_read_timeout 120s;
  }

  # SPA fallback: every non-file route resolves to the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
